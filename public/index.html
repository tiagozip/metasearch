<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>search!</title>
    <meta name="theme-color" content="#1f1e2e" />
    <style>
      * {
        box-sizing: border-box;
        min-width: 0;
        text-underline-offset: 3px;
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
      }

      :root {
        color-scheme: dark;
        interpolate-size: allow-keywords;
        font-family:
          InstrumentSans,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }

      html {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-text-size-adjust: 100%;
        -moz-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        text-size-adjust: 100%;

        background-color: #1f1e2e;
        --text: #cdd6f4;
        scrollbar-gutter: stable;
        overflow-x: hidden;
      }

      input,
      textarea,
      select {
        field-sizing: content;
      }

      body {
        display: flex;
        width: 100%;
        margin: 0px;
        padding: 0px;
        min-height: 100vh;
        flex-direction: column;
        overflow-x: hidden;
      }

      header {
        max-width: 1136px;
        margin: 0px auto;
        width: 100%;
        padding-left: 18px;
        padding-right: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 20vh;

        form {
          width: 100%;
          max-width: 500px;
        }
      }

      .search-container {
        display: flex;
        gap: 24px;

        .search-bar {
          height: 40px;
          background-color: #313244;
          border: 1px solid #7f849c78;
          width: 100%;
          border-radius: 6px;
          display: flex;
          max-width: 672px;
          cursor: text;

          &:has(input:focus) {
            border-color: #bac2de;
            outline: rgb(186, 194, 222) 0.5px solid;
          }

          input {
            background-color: transparent;
            border: none;
            height: 100%;
            width: 100%;
            padding: 0 10px;
            font-size: 1em;
            font-family: inherit;
            color: var(--text);

            &:focus {
              outline: none;
            }

            &::placeholder {
              color: #7f849c;
              user-select: none;
            }
          }

          button {
            aspect-ratio: 1;
            height: 100%;
            border-radius: 13.6px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--text);
            transform: scale(0.9);
            justify-content: center;

            svg {
              width: 20px;
              height: 28px;
            }
          }
        }
      }

      .links {
        font-size: 15px;
        margin-top: 14px;
        color: #cdd6f769;
        user-select: none;

        a {
          color: var(--text);
          text-decoration: none;

          &:hover {
            text-decoration: underline;
          }
        }
      }

      @font-face {
        font-family: "InstrumentSans";
        font-display: swap;
        src: url("/s/inter-var-v4.woff2");
      }

      @view-transition {
        navigation: auto;
      }

      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.1s;
      }
    </style>
    <link
      rel="preload"
      href="/s/inter-var-v4.woff2"
      as="font"
      type="font/woff2"
    />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="x-ua-compatible" content="IE=edge,chrome=1" />
    <meta name="robots" content="index,follow" />
    <link
      title="search.tiago.zip"
      href="/s/opensearch.xml"
      rel="search"
      type="application/opensearchdescription+xml"
    />
  </head>
  <body>
    <header>
      <form action="/">
        <div class="search-container">
          <div class="search-bar">
            <input
              class="searchinput"
              name="q"
              placeholder="search…"
              autofocus
            />

            <button title="search!" type="submit">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
                class="w-6 h-6"
                focusable="false"
                style="fill: currentColor"
              >
                <path
                  d="m18.031 16.617 4.283 4.282-1.415 1.415-4.282-4.283A8.96 8.96 0 0 1 11 20c-4.968 0-9-4.032-9-9s4.032-9 9-9 9 4.032 9 9a8.96 8.96 0 0 1-1.969 5.617m-2.006-.742A6.98 6.98 0 0 0 18 11c0-3.867-3.133-7-7-7s-7 3.133-7 7 3.133 7 7 7a6.98 6.98 0 0 0 4.875-1.975z"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </form>
      <div class="links">
        <a href="/about" target="_blank">about</a> ·
        <a href="https://github.com/tiagozip/search" target="_blank">source</a>
        ·
        <a
          href="https://searchvtj6gllq3rhlq7xhar3z6wja4ffoofylcbgu3ucqe267b3qkyd.onion"
          >tor</a
        >
        ·
        <a href="/bangs" target="_blank">bangs</a>
      </div>
    </header>

    <script>
      document
        .querySelector("input.searchinput")
        .addEventListener("input", () => {
          document.title = document.querySelector("input").value || "search!";
        });

      document.addEventListener("DOMContentLoaded", () => {
        let cookiesEnabled;

        try {
          document.cookie = "test=1; path=/";
          cookiesEnabled = document.cookie.indexOf("test=") !== -1;
          document.cookie =
            "test=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";
        } catch {}

        if (!cookiesEnabled) {
        }
      });
    </script>
  </body>
</html>
