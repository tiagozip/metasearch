        flex-direction: column;

        height: 100vh;

        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 20vh;
        height: 100vh;

        form {
          width: 100%;
          max-width: 500px;
        }
      }

      .search-container {
        display: flex;
        gap: 24px;

        .search-bar {
          height: 40px;
          background-color: #313244;
          border: 1px solid #7f849c78;
          width: 100%;
          border-radius: 6px;
          display: flex;
          max-width: 672px;
          cursor: text;

          &:has(input:focus) {
            border-color: #bac2de;
            outline: rgb(186, 194, 222) 0.5px solid;
          }

          input {
            background-color: transparent;
            border: none;
            height: 100%;
            width: 100%;
            padding: 0 10px;
            font-size: 1em;
            font-family: inherit;
            color: var(--text);

            &:focus {
              outline: none;
            }

            &::placeholder {
              color: #7f849c;
              user-select: none;
            }
          }

          button {
            aspect-ratio: 1;
            height: 100%;
            border-radius: 13.6px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--text);
            transform: scale(0.9);
            justify-content: center;

            svg {
              width: 20px;
              height: 28px;
            }
          }
        }
      }

      .links {
        font-size: 15px;
        margin-top: 14px;
        color: #cdd6f769;
        user-select: none;

        a {
          color: var(--text);
          text-decoration: none;

          &:hover {
            text-decoration: underline;
          }

          b {
            font-weight: 500;
          }
        }
      }

      .workers {
        font-size: 12px;
        color: #7f849ccc;
        margin-top: auto;
        margin-bottom: 5vh;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 6px;

        svg {
          width: 24px;
          height: 24px;
          margin-top: -3px;
        }
      }

      @font-face {
        font-family: "InstrumentSans";
        font-display: swap;
        src: url("/s/inter-var-v4.woff2");
      }

      @view-transition {
        navigation: auto;
      }

      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.1s;
      }
